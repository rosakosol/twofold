name = "twofold-site"
pages_build_output_dir = "."
compatibility_date = "2025-07-01"

# Non-secret config. Update these once your sending domain is verified in Resend.
[vars]
FROM_EMAIL = "Twofold <hello@twofoldapp.com.au>"
NOTIFY_EMAIL = "hello@twofoldapp.com.au"
# The feedback board's Vercel deployment (site/feedback/) — proxied at /feedback/* by
# functions/feedback/[[path]].ts. Replace with the real production URL once that
# project has one (Vercel project settings -> Domains); this placeholder will 404.
FEEDBACK_ORIGIN = "https://twofold-feedback.vercel.app"

# Created via `wrangler d1 create twofold-waitlist` — replace database_id with the id it prints.
[[d1_databases]]
binding = "DB"
database_name = "twofold-waitlist"
database_id = "43b7720f-3a3e-4b11-ad8a-0dee5d6bc26d"
